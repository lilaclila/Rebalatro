
[manifest]
version = "1.3.0"
dump_lua = true
priority = 0


[[patches]]
[patches.pattern]
target = "tag.lua"
pattern = """                    card = create_card('Joker', _context.area, nil, 1, nil, nil, nil, 'rta')"""

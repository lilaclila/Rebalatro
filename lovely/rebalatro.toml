match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = """            for j = 1, #G.jokers.cards do
                local eval = nil
                eval = G.jokers.cards[j]:calculate_joker({discard = true, other_card =  G.hand.highlighted[i], full_hand = G.hand.highlighted})
                if eval then
                    if eval.remove then removed = true end
                    card_eval_status_text(G.jokers.cards[j], 'jokers', nil, 1, nil, eval)
                end
            end"""
position = "at"
payload = """
            local allowed_jokers = {['Yorick'] = true, ['Hit the Road'] = true, ['Ramen'] = true, ['Castle'] = true, ['Mail-In Rebate'] = true}
            local has_allowed = false
            if G.jokers and G.jokers.cards then
                for _, jk in ipairs(G.jokers.cards) do
                    if allowed_jokers[jk.ability.name] then
                        has_allowed = true
                        break
                    end
                end
            end
            local reps = 1 + ((has_allowed and G.hand.highlighted[i]:get_seal() == 'Red') and 1 or 0)
            for r = 1, reps do
                if r > 1 then
                    card_eval_status_text(G.hand.highlighted[i], 'extra', nil, nil, nil, {message = localize('k_again_ex')})
                end
                for j = 1, #G.jokers.cards do
                    if r == 1 or allowed_jokers[G.jokers.cards[j].ability.name] then
                        local eval = nil
                        eval = G.jokers.cards[j]:calculate_joker({discard = true, other_card =  G.hand.highlighted[i], full_hand = G.hand.highlighted})
                        if eval then
                            if eval.remove then removed = true end
                            card_eval_status_text(G.jokers.cards[j], 'jokers', nil, 1, nil, eval)
                        end
                    end
                end
            end
"""
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = """            delay(0.5)
            ease_dollars(self.ability.extra.dollars)"""
position = "before"
payload = """
            if G.jokers and G.jokers.cards then
                local destructable_jokers = {}
                for i = 1, #G.jokers.cards do
                    if G.jokers.cards[i] ~= self and not G.jokers.cards[i].ability.eternal and not G.jokers.cards[i].getting_sliced then 
                        destructable_jokers[#destructable_jokers+1] = G.jokers.cards[i] 
                    end
                end
                local joker_to_destroy = #destructable_jokers > 0 and pseudorandom_element(destructable_jokers, pseudoseed('immolate_joker')) or nil

                if joker_to_destroy then 
                    G.E_MANAGER:add_event(Event({
                        trigger = 'after',
                        delay = 0.4,
                        func = function()
                            joker_to_destroy:start_dissolve(nil, nil)
                            return true
                        end
                    }))
                end
            end
"""
match_indent = true

[[patches]]
[patches.pattern]
target = "card.lua"
pattern = '''
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = localize('k_plus_planet'), colour = G.C.SECONDARY_SET.Planet})
'''
position = "at"
payload = '''
        self.ability.blue_seal_triggers = (self.ability.blue_seal_triggers or 0) + 1
        local msg = localize('k_plus_planet')
        if self.ability.blue_seal_triggers >= 3 then
            msg = "Scraped!"
            G.E_MANAGER:add_event(Event({
                trigger = 'after',
                delay = 0.1,
                func = function()
                    self:set_seal(nil, true)
                    return true
                end
            }))
        end
        card_eval_status_text(self, 'extra', nil, nil, nil, {message = msg, colour = G.C.SECONDARY_SET.Planet})
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "functions/state_events.lua"
pattern = '''
            ease_discard(-1)
'''
position = "after"
payload = '''
            if G.GAME.blind.name == 'Amber Acorn' and #G.jokers.cards > 1 then
                G.E_MANAGER:add_event(Event({ trigger = 'after', delay = 0.2, func = function() 
                    G.E_MANAGER:add_event(Event({ func = function() G.jokers:shuffle('aajk'); play_sound('cardSlide1', 0.85);return true end })) 
                    delay(0.15)
                    G.E_MANAGER:add_event(Event({ func = function() G.jokers:shuffle('aajk'); play_sound('cardSlide1', 1.15);return true end })) 
                    delay(0.15)
                    G.E_MANAGER:add_event(Event({ func = function() G.jokers:shuffle('aajk'); play_sound('cardSlide1', 1);return true end })) 
                    delay(0.5)
                return true end })) 
            end
'''
match_indent = true


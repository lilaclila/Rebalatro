
[manifest]
version = "1.0.0"
dump_lua = true
priority = 0


[[patches]]
[patches.pattern]
target = "tag.lua"
pattern = """                    card = create_card('Joker', _context.area, nil, 1, nil, nil, nil, 'rta')"""
position = "at"
payload = """                    card = create_card('Joker', _context.area, nil, 1, nil, nil, nil, 'rta')
                    card.ability.eternal = nil; card.ability.perishable = nil; card.ability.rental = nil"""
match_indent = true

[[patches]]
[patches.pattern]
target = "tag.lua"
pattern = """                card = create_card('Joker', _context.area, nil, 0.9, nil, nil, nil, 'uta')"""
position = "at"
payload = """                card = create_card('Joker', _context.area, nil, 0.9, nil, nil, nil, 'uta')
                card.ability.eternal = nil; card.ability.perishable = nil; card.ability.rental = nil"""
match_indent = true


[[patches]]
